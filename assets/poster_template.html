<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<!--
  mockmeup poster template — a premium 4:5 (social) starting scaffold.

  HOW TO USE (the skill fills these in, then renders with render_poster.py):
    {{EYEBROW}}    short kicker, e.g. "AI · PRODUCTIVITY"        (optional)
    {{NAME}}       app name; wrap ONE word in <span class="hl">…</span> for a focal accent
    {{TAGLINE}}    specific 4–10 word value proposition
    {{CHIP_1..3}}  short feature/stack pills (delete unused)
    {{SHOT_1}}     path/URL to the hero screenshot  (relative to this html file)
    {{LOGO}}       path to logo image (optional; falls back to a lettermark)
    --accent / --accent-2 / bg family:  swap to match the app (see references/backgrounds.md)

  This is a STARTING POINT for a portrait poster. For og/wide/hero/story sizes, or for a
  bolder concept, author bespoke HTML using references/{backgrounds,frames,layout}.md.
  render_poster.py screenshots the .poster element and injects --canvas-w/--canvas-h.
-->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter+Tight:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --accent:#6d8bff;
    --accent-2:#c07bff;
    --ink:#eef1fb;
    --muted:rgba(238,241,251,.72);
    --bg-0:#070912;
    --display:"Space Grotesk", system-ui, sans-serif;
    --body:"Inter Tight", system-ui, sans-serif;
    --margin:8%;
  }
  *{ box-sizing:border-box; }
  html,body{ margin:0; padding:0; background:#000; }

  .poster{
    position:relative; overflow:hidden;
    width:var(--canvas-w,1080px);
    height:var(--canvas-h,1350px);
    font-family:var(--body); color:var(--ink);
    display:flex; flex-direction:column;
  }

  /* ---------- background stack (family: aurora — see backgrounds.md) ---------- */
  .bg{ position:absolute; inset:0; z-index:0;
    background:
      radial-gradient(60% 50% at 18% 12%, color-mix(in oklab, var(--accent) 55%, transparent) 0%, transparent 60%),
      radial-gradient(55% 55% at 88% 82%, color-mix(in oklab, var(--accent-2) 50%, transparent) 0%, transparent 55%),
      radial-gradient(80% 60% at 50% 120%, color-mix(in oklab, var(--accent) 22%, transparent) 0%, transparent 60%),
      linear-gradient(160deg, #0a0e1c 0%, var(--bg-0) 60%, #05070f 100%);
  }
  .grain{ position:absolute; inset:0; z-index:1; pointer-events:none; opacity:.06; mix-blend-mode:overlay;
    background-image:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='120' height='120'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='2'/></filter><rect width='100%25' height='100%25' filter='url(%23n)'/></svg>");
    background-size:180px 180px; }
  .vignette{ position:absolute; inset:0; z-index:1; pointer-events:none;
    box-shadow:inset 0 0 240px 40px rgba(0,0,0,.45); }

  /* ---------- content ---------- */
  .content{ position:relative; z-index:2; flex:1; display:flex; flex-direction:column;
            padding:calc(var(--margin) * 1.1) var(--margin) 0; }

  .brandline{ display:flex; align-items:center; gap:18px; margin-bottom:34px; }
  .logo{ width:64px; height:64px; border-radius:16px; object-fit:cover;
         box-shadow:0 8px 24px -6px rgba(0,0,0,.5); }
  .lettermark{ width:64px; height:64px; border-radius:16px; display:grid; place-items:center;
         font-family:var(--display); font-weight:700; font-size:34px; color:#0a0c16;
         background:linear-gradient(150deg, var(--accent), var(--accent-2)); }
  .eyebrow{ font-size:18px; font-weight:600; letter-spacing:4px; text-transform:uppercase;
            color:var(--accent); }

  h1.name{ font-family:var(--display); font-weight:700; font-size:104px; line-height:.98;
           letter-spacing:-3px; margin:0 0 22px; }
  h1.name .hl{ color:var(--accent);
    background:linear-gradient(120deg,var(--accent),var(--accent-2));
    -webkit-background-clip:text; background-clip:text; -webkit-text-fill-color:transparent; }
  .tagline{ font-size:36px; font-weight:400; line-height:1.32; color:var(--muted);
            max-width:88%; margin:0 0 30px; }

  .chips{ display:flex; flex-wrap:wrap; gap:12px; margin-bottom:auto; }
  .chip{ font-size:20px; font-weight:500; padding:11px 20px; border-radius:999px;
         color:var(--ink);
         background:color-mix(in oklab, var(--accent) 14%, transparent);
         border:1px solid color-mix(in oklab, var(--accent) 40%, transparent); }

  /* ---------- hero screenshot in a browser frame, angled & bleeding off-bottom ---------- */
  .stage{ position:relative; z-index:2; height:52%; margin-top:24px;
          display:flex; align-items:flex-end; justify-content:center; }
  .browser{ width:94%; border-radius:16px 16px 0 0; overflow:hidden; background:#12131a;
            transform:perspective(2200px) rotateX(6deg); transform-origin:bottom center;
            box-shadow:0 -10px 60px -10px rgba(0,0,0,.5), 0 40px 80px -20px rgba(0,0,0,.6),
                       inset 0 0 0 1px rgba(255,255,255,.08); }
  .chrome{ display:flex; align-items:center; gap:9px; padding:14px 18px;
           background:linear-gradient(#20222c,#181a22); }
  .dot{ width:13px; height:13px; border-radius:50%; }
  .dot.r{background:#ff5f57} .dot.y{background:#febc2e} .dot.g{background:#28c840}
  .url{ margin-left:16px; flex:1; max-width:55%; height:28px; border-radius:8px; background:#0d0e14;
        color:#8b90a3; font:14px/28px ui-monospace,monospace; padding:0 14px;
        white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .shot{ display:block; width:100%; height:auto;
         /* fallback look if no image is provided */
         min-height:520px; background:
           repeating-linear-gradient(45deg,#1a1c26,#1a1c26 22px,#171821 22px,#171821 44px); }
</style>
</head>
<body>
  <div class="poster">
    <div class="bg"></div>
    <div class="grain"></div>
    <div class="vignette"></div>

    <div class="content">
      <div class="brandline">
        <!-- Replace with <img class="logo" src="{{LOGO}}"> when a logo exists -->
        <div class="lettermark">{{INITIAL}}</div>
        <div class="eyebrow">{{EYEBROW}}</div>
      </div>

      <h1 class="name">{{NAME}}</h1>
      <p class="tagline">{{TAGLINE}}</p>

      <div class="chips">
        <span class="chip">{{CHIP_1}}</span>
        <span class="chip">{{CHIP_2}}</span>
        <span class="chip">{{CHIP_3}}</span>
      </div>
    </div>

    <div class="stage">
      <div class="browser">
        <div class="chrome">
          <span class="dot r"></span><span class="dot y"></span><span class="dot g"></span>
          <div class="url">{{URL}}</div>
        </div>
        <img class="shot" src="{{SHOT_1}}" alt="" onerror="this.style.visibility='hidden'">
      </div>
    </div>
  </div>
</body>
</html>
